# =============================================================
# WORKFLOW AUTOMÁTICO DE CONTRIBUCIONES
# =============================================================
# Cuando un alumno abre un Pull Request, este workflow:
#   1. Valida que solo se modifican archivos en alumnos/
#   2. Comprueba que el archivo tiene el formato correcto
#   3. Si todo pasa, FUSIONA el PR automáticamente
#   4. Actualiza la galería y DESPLIEGA la web
# =============================================================

name: Validar, fusionar y desplegar

on:
  pull_request_target:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  validar-y-fusionar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código del PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verificar que el PR solo toca la carpeta alumnos/
        run: |
          echo "📂 Comprobando archivos modificados en el PR..."
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/changed.txt
          cat /tmp/changed.txt

          if grep -v '^alumnos/' /tmp/changed.txt | grep -v '^$' > /dev/null 2>&1; then
            echo ""
            echo "❌ ERROR: Solo puedes añadir/modificar archivos dentro de la carpeta alumnos/"
            echo "Archivos no permitidos:"
            grep -v '^alumnos/' /tmp/changed.txt
            exit 1
          fi
          echo "✅ Todos los cambios están en alumnos/"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar que hay al menos un archivo de contribución
        run: |
          TOTAL=$(find alumnos/ -name "*.html" ! -name "ejemplo.html" | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ ERROR: No se encontró ningún archivo .html en alumnos/ (aparte de ejemplo.html)"
            echo "Debes copiar ejemplo.html y renombrarlo con tu nombre, p.ej. alumnos/ana-garcia.html"
            exit 1
          fi
          echo "✅ Encontradas $TOTAL contribuciones"

      - name: Verificar formato del archivo de contribución
        run: |
          ERRORES=0
          for f in alumnos/*.html; do
            [ "$(basename "$f")" = "ejemplo.html" ] && continue

            echo "🔍 Validando $f ..."

            if ! grep -q "alumno-card" "$f"; then
              echo "   ❌ No contiene la clase 'alumno-card'"
              ERRORES=$((ERRORES+1))
            fi

            if ! grep -q "<iframe" "$f"; then
              echo "   ❌ No contiene un <iframe>"
              ERRORES=$((ERRORES+1))
            fi

            if grep -q "TU-USUARIO" "$f" || grep -q "TU_NOMBRE" "$f"; then
              echo "   ❌ Aún contiene placeholders sin rellenar (TU-USUARIO o TU_NOMBRE)"
              ERRORES=$((ERRORES+1))
            fi

            if [ "$ERRORES" -eq 0 ]; then
              echo "   ✅ Formato correcto"
            fi
          done

          if [ "$ERRORES" -gt 0 ]; then
            echo ""
            echo "❌ Se encontraron $ERRORES errores de formato. Corrige y haz push de nuevo."
            exit 1
          fi

      - name: Fusionar PR automáticamente
        if: success()
        run: |
          echo "🔀 Fusionando PR #${{ github.event.pull_request.number }} automáticamente..."
          gh pr merge ${{ github.event.pull_request.number }} --squash \
            --subject "Contribución de ${{ github.event.pull_request.user.login }}" \
            || echo "⚠️ No se pudo fusionar (posible conflicto). El profesor lo revisará manualmente."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Esperar a que el merge se propague
        if: success()
        run: sleep 5

      - name: Clonar repositorio actualizado (post-merge)
        if: success()
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generar galería con las contribuciones
        if: success()
        run: |
          echo "📊 Recopilando contribuciones de alumnos/..."

          # Concatenar todos los archivos de contribución
          > /tmp/galeria.html
          TOTAL=0
          for f in alumnos/*.html; do
            [ "$(basename "$f")" = "ejemplo.html" ] && continue
            cat "$f" >> /tmp/galeria.html
            echo "" >> /tmp/galeria.html
            TOTAL=$((TOTAL+1))
          done

          echo "   Encontradas $TOTAL contribuciones"

          # Insertar las contribuciones en index.html entre los marcadores
          python3 << 'PYEOF'
          import re

          with open('/tmp/galeria.html', 'r') as f:
              galeria = f.read().strip()

          with open('index.html', 'r') as f:
              html = f.read()

          nuevo = re.sub(
              r'(<!-- INICIO GALERÍA -->).*?(<!-- FIN GALERÍA -->)',
              lambda m: m.group(1) + '\n' + galeria + '\n' + m.group(2),
              html,
              flags=re.DOTALL
          )

          with open('index.html', 'w') as f:
              f.write(nuevo)

          print("✅ index.html actualizado con la galería")
          PYEOF

      - name: Desplegar en GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages

      - name: Resultado
        if: success()
        run: |
          echo ""
          echo "🎉 ¡Contribución validada, fusionada y desplegada!"
